<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="indix.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <center>
      <div class="calculator">
        <input
          type="text"
          dir="rtl"
          placeholder="0"
          id="input"
          style="font-size: xx-large"
        />
        <div class="deg">
          <button class="btn ">DEG</button>
          <button class="btn ">F-E</button>
        </div>
        

        <div class="advanceOperations">
          <button class="btn text-muted">MC</button>
          <button class="btn text-muted">MR</button>
          <button class="btn ">M+</button>
          <button class="btn ">M-</button>
          <button class="btn ">MS</button>

        </div>
        <div class="advanceFunction1">
            <select value="trignometry">
                <option value="sin">&#9727 Trignometry</option>
                 <option value="sin">Sin</option>
                 <option value="sin">Cos</option>
                 <option value="sin">Tan</option>
                 <option value="sin">Cos</option>
                 <option value="sin">Sec</option>
                 <option value="sin">Cose</option>
            </select>
            <select value="function">
                <option value="sin">&#10765 function</option>
            </select>
        </div>

        <div class="basicOperations">
          <button value="sec" class="btn border border-1">2<sup>nd</sup></button>
          <button class="btn border border-1">π</button>
          <button class="btn border border-1">e</button>
          <button class="btn border border-1">C</button>
          <button class="btn border border-1">x </button>
          <button class="btn border border-1">x<sup>2</sup></button>

          <button class="btn border border-1">1/x</button>
          <button class="btn border border-1">|x|</button>
          <button class="btn border border-1">exp</button>
          <button class="btn border border-1">mod</button>
          <button class="btn border border-1">3√x</button>
          <button class="btn border border-1">(</button>
          <button class="btn border border-1">)</button>
          <button class="btn border border-1">n!</button>
          <button class="btn border border-1"><strong>÷</strong></button>
          <button class="btn border border-1">x<sup>y</sup></button>
          <button class="btn border border-1 bg-white">7</button>
          <button class="btn border border-1 bg-white">8</button>
          <button class="btn border border-1 bg-white">9</button>
          <button class="btn border border-1">x</button>
          <button class="btn border border-1">10<sup>x</sup></button>
          <button class="btn border border-1 bg-white">4</button>
          <button class="btn border border-1 bg-white">5</button>
          <button class="btn border border-1 bg-white">6</button>
          <button class="btn border border-1">-</button>
          <button class="btn border border-1">log</button>
          <button value="one" class="btn border border-1 bg-white">1</button>
          <button class="btn border border-1 bg-white">2</button>
          <button class="btn border border-1 bg-white">3</button>
          <button class="btn border border-1" onclick="">+</button>
          <button class="btn border border-1">ln</button>
          <button class="btn border border-1 bg-white">+/-</button>
          <button class="btn border border-1 bg-white">0</button>
          <button class="btn border border-1 bg-white">.</button>
          <button class="btn border border-1 bg-info">=</button>
        </div>
      </div>
    </center>
  </body>
</html>
